# config/ntu-25joint/colab.yaml
# Fall Detection — BlockGCN — NTU RGB+D 25 joint — Google Colab
# Identik dengan default.yaml kecuali: path Drive dan num_worker Colab
#
# Cara pakai di Colab:
#   !python main.py --config config/ntu-25joint/colab.yaml
#
# Pastikan dataset sudah disiapkan dengan prepare_dataset_ntu_v2.py
# dan di-upload ke: MyDrive/Fall-Detection/dataset/dataset_yolo_25/

work_dir: /content/drive/MyDrive/Fall-Detection/work_dir/ntu_fall_25joint
phase: train
seed: 42
print_log: True
save_score: True

device: [0]

# ── Model ──────────────────────────────────────────────────────────────────────
model: model.BlockGCN.Model
model_args:
  num_class: 2
  num_point: 25
  num_person: 1
  graph: graph.ntu_rgb_d.Graph
  graph_args:
    labeling_mode: spatial
  in_channels: 3
  drop_out: 0.3
  adaptive: True
  alpha: False

weights: null
ignore_weights: []

# ── Optimizer ──────────────────────────────────────────────────────────────────
optimizer: SGD
base_lr: 0.1
momentum: 0.9
nesterov: True
weight_decay: 0.0004
lr_decay_rate: 0.1
step: [50, 70]
warm_up_epoch: 5

# ── Training ───────────────────────────────────────────────────────────────────
num_epoch: 90
start_epoch: 0
batch_size: 8
test_batch_size: 8

log_interval: 20
save_interval: 1
save_epoch: 30
eval_interval: 1
show_topk: [1]

# ── Feeder ─────────────────────────────────────────────────────────────────────
feeder: feeders.feeder_ntu.Feeder
num_worker: 4
use_weighted_sampler: True

train_feeder_args:
  data_path: /content/drive/MyDrive/Fall-Detection/dataset/dataset_yolo_25/train_data.npy
  label_path: /content/drive/MyDrive/Fall-Detection/dataset/dataset_yolo_25/train_label.pkl
  split: train
  window_size: 150
  p_interval: [0.5, 1.0]
  random_move: True
  random_shift: True
  random_flip: True
  random_speed: True
  random_noise: False
  normalization: False
  debug: False
  use_mmap: False

test_feeder_args:
  data_path: /content/drive/MyDrive/Fall-Detection/dataset/dataset_yolo_25/val_data.npy
  label_path: /content/drive/MyDrive/Fall-Detection/dataset/dataset_yolo_25/val_label.pkl
  split: val
  window_size: 150
  p_interval: [1.0, 1.0]
  random_move: False
  random_shift: False
  random_flip: False
  random_speed: False
  random_noise: False
  normalization: False
  debug: False
  use_mmap: False

alpha: False

